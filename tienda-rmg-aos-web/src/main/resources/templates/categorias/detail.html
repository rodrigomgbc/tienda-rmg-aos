<!DOCTYPE html>
<html lang="es" class="no-js" xmlns:th="http://www.thymeleaf.org">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'RawBean — ' + ${categoria.nombre}">RawBean — Categoría</title>

  <script>
    document.documentElement.classList.remove('no-js');
    document.documentElement.classList.add('js');
  </script>

  <link rel="stylesheet" th:href="@{/css/vendor.css}">
  <link rel="stylesheet" th:href="@{/css/styles.css}">

  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon-16x16.png}">

</head>

<body id="top">

<div id="preloader">
  <div id="loader" class="dots-fade">
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<div id="page" class="s-pagewrap">

  <header class="s-header">
    <div class="container s-header__content">

      <div class="s-header__block">
        <div class="header-logo">
          <a class="logo" th:href="@{/}">
            <img th:src="@{/images/logo.svg}" alt="RawBean Homepage">
          </a>
        </div>
        <a class="header-menu-toggle" href="#0"><span>Menu</span></a>
      </div>

      <nav class="header-nav">
        <ul class="header-nav__links">
          <li><a th:href="@{/}">Inicio</a></li>
          <li class="current"><a th:href="@{/categorias}">Tienda</a></li>
          <li><a th:href="@{/aboutus.html}">Sobre Nosotros</a></li>
          <li><a th:href="@{/use-conditions}">Condiciones de Uso</a></li>
        </ul>
        <div class="header-contact">
          <a href="mailto:hola@rawbean.es" class="header-contact__num btn">
            hola@rawbean.es
          </a>
        </div>
      </nav>

    </div>
  </header>


  <section class="container" style="padding-top: 12rem; padding-bottom: 6rem;">

    <!-- Breadcrumb -->
    <div class="row" style="margin-bottom: 2rem;">
      <div class="column xl-12">
        <p style="color: #aaa; font-size: 1.4rem;">
          <a th:href="@{/}" style="color: #aaa;">Inicio</a>
          &nbsp;/&nbsp;
          <a th:href="@{/categorias}" style="color: #aaa;">Categorías</a>
          &nbsp;/&nbsp;
          <span th:text="${categoria.nombre}"></span>
        </p>
      </div>
    </div>

    <!-- Detalle -->
    <div class="row s-about__content" style="margin-top: 2rem;">

      <div class="column xl-4 lg-5 md-12">
        <figure>
          <img th:if="${categoria.imagen != null}"
               th:src="@{/images/categories/__${categoria.imagen}__}"
               th:alt="${categoria.nombre}"
               style="width: 100%; object-fit: cover;">

          <img th:if="${categoria.imagen == null}"
               th:src="@{/images/categories/no-image.webp}"
               alt="Imagen no disponible"
               style="width: 100%; object-fit: cover;">
        </figure>
      </div>

      <div class="column xl-6 lg-6 md-12">
        <div class="section-header" data-num="01">
          <h2 class="text-display-title" th:text="${categoria.nombre}"></h2>
        </div>
        <p th:text="${categoria.descripcion}" style="font-size: 1.8rem; line-height: 1.7;"></p>
        <a th:href="@{/categorias}" class="btn btn--primary" style="margin-top: 2rem;">
          ← Volver a categorías
        </a>
      </div>

    </div>

  </section>


  <footer id="footer" class="container s-footer">

    <div class="row s-footer__main">
      <div class="column xl-3 lg-12 footer-block s-footer__main-start">
        <div class="s-footer__logo">
          <a class="logo" th:href="@{/}">
            <img th:src="@{/images/logo.svg}" alt="RawBean">
          </a>
        </div>
      </div>
      <div class="column xl-9 lg-12 s-footer__main-end grid-cols grid-cols--wrap">
        <div class="grid-cols__column footer-block">
          <h6>Tienda online</h6>
          <ul class="link-list">
            <li><a th:href="@{/categorias}">Categorías</a></li>
            <li><a th:href="@{/}">Inicio</a></li>
          </ul>
        </div>
        <div class="grid-cols__column footer-block">
          <h6>Información</h6>
          <ul class="link-list">
            <li><a th:href="@{/aboutus.html}">Sobre Nosotros</a></li>
            <li><a th:href="@{/use-conditions}">Condiciones de Uso</a></li>
          </ul>
        </div>
        <div class="grid-cols__column footer-block">
          <h6>Contacto</h6>
          <ul class="link-list">
            <li><a href="mailto:hola@rawbean.es">hola@rawbean.es</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="row s-footer__bottom">
      <div class="column xl-6 lg-12">
        <p class="ss-copyright">
          <span>© RawBean 2025</span>
        </p>
      </div>
    </div>

    <div class="ss-go-top">
      <a class="smoothscroll" title="Back to Top" href="#top">
        <svg clip-rule="evenodd" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="m14.523 18.787s4.501-4.505 6.255-6.26c.146-.146.219-.338.219-.53s-.073-.383-.219-.53c-1.753-1.754-6.255-6.258-6.255-6.258-.144-.145-.334-.217-.524-.217-.193 0-.385.074-.532.221-.293.292-.295.766-.004 1.056l4.978 4.978h-14.692c-.414 0-.75.336-.75.75s.336.75.75.75h14.692l-4.979 4.979c-.289.289-.286.762.006 1.054.148.148.341.222.533.222.19 0 .378-.072.522-.215z" fill-rule="nonzero"/></svg>
      </a>
      <span>Back To Top</span>
    </div>

  </footer>

</div>

<script th:src="@{/js/plugins.js}"></script>
<script th:src="@{/js/main.js}"></script>

</body>
</html>
