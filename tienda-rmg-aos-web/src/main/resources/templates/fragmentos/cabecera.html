<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    FRAGMENT: header   (genérico, para páginas interiores)
    Uso:   <div th:replace="~{fragmentos/cabecera :: cabecera('shop')}"></div>
    Valores válidos para 'active':  home | shop | about | terms | (vacío)
-->
<header th:fragment="cabecera(active)" class="s-header">
    <div class="container s-header__content">

        <div class="s-header__block">
            <div class="header-logo">
                <a class="logo" th:href="@{/}">
                    <img th:src="@{/images/logo.svg}" alt="RawBean Homepage">
                </a>
            </div>
            <a class="header-menu-toggle" href="#0"><span>Menu</span></a>
        </div>

        <nav class="header-nav">
            <ul class="header-nav__links">
                <li th:classappend="${active == 'home'}  ? 'current'"><a th:href="@{/}">Inicio</a></li>
                <li th:classappend="${active == 'shop'}  ? 'current'"><a th:href="@{/categorias}">Tienda</a></li>
                <li th:classappend="${active == 'about'} ? 'current'"><a th:href="@{/sobre-nosotros.html}">Sobre Nosotros</a></li>
                <li th:classappend="${active == 'terms'} ? 'current'"><a th:href="@{/condiciones-uso}">Condiciones de Uso</a></li>
            </ul>

            <div class="header-contact">
                <a href="mailto:hola@rawbean.es" class="header-contact__num btn">
                    hola@rawbean.es
                </a>
            </div>
        </nav>

    </div>
</header>

</body>
</html>
