<!DOCTYPE html>
<html lang="es" class="no-js" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'RawBean — ' + ${producto.nombre}">RawBean — Producto</title>

    <script>
        document.documentElement.classList.remove('no-js');
        document.documentElement.classList.add('js');
    </script>

    <th:block th:replace="~{fragmentos/recursos-head :: recursos-head}"></th:block>

</head>

<body id="top">

<div id="preloader">
    <div id="loader" class="dots-fade">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<div id="page" class="s-pagewrap">

    <div th:replace="~{fragmentos/cabecera :: cabecera('shop')}"></div>

    <section class="container" style="padding-top: 12rem; padding-bottom: 6rem;">

        <div class="row">

            <!-- Imagen -->
            <div class="column xl-6">
                <figure style="position: relative;">
                    <span th:if="${producto.descuento > 0}"
                          style="position: absolute; top: 10px; left: 10px; background: #e74c3c; color: white; padding: 6px 12px; border-radius: 4px; font-size: 1rem; font-weight: bold;"
                          th:text="${producto.descuento} + '%'"></span>

                    <img th:if="${producto.imagen != null}"
                         th:src="@{${producto.imagen}}"
                         th:alt="'Imagen de ' + ${producto.nombre}"
                         style="width: 100%; object-fit: cover;">

                    <img th:if="${producto.imagen == null}"
                         th:src="@{/images/categories/no-image.webp}"
                         alt=""
                         style="width: 100%; object-fit: cover;">
                </figure>
            </div>

            <!-- Información -->
            <div class="column xl-6">

                <h1 th:text="${producto.nombre}" style="margin-bottom: 0.5rem;"></h1>

                <p th:if="${producto.marca != null}"
                   style="color: gray; font-size: 1rem; margin-bottom: 1rem;">
                    <a th:href="@{/marcas/{id}/{slug}(id=${producto.marca.id}, slug=${T(es.iesclaradelrey.da2d1a.tiendarmgaos.common.utils.SlugUtils).toSlug(producto.marca.nombre)})}"
                       style="color: gray;"
                       th:text="${producto.marca.nombre}"></a>
                </p>
                <!-- Categorias del producto (PDF 7 - render condicional) -->
                <!-- 0 categorias -> no aparece nada -->
                <!-- 1 categoria  -> parrafo con enlace -->
                <p th:if="${producto.categorias.size() == 1}"
                   style="margin-bottom: 1rem; font-size: 1rem;">
                    <span th:each="cat : ${producto.categorias}">
                        <a th:href="@{/categorias/{id}(id=${cat.id})}"
                           style="color: #888;"
                           th:text="${cat.nombre}"></a>
                    </span>
                </p>
                <!-- Varias categorias -> lista <ul><li> con enlaces -->
                <ul th:if="${producto.categorias.size() > 1}"
                    style="margin-bottom: 1rem; padding-left: 1.5rem; font-size: 1rem;">
                    <li th:each="cat : ${producto.categorias}">
                        <a th:href="@{/categorias/{id}(id=${cat.id})}"
                           style="color: #888;"
                           th:text="${cat.nombre}"></a>
                    </li>
                </ul>


                <!-- EAN -->
                <p style="font-size: 0.85rem; color: gray;">
                    EAN: <span th:text="${producto.codigoEan}"></span>
                </p>

                <!-- Precio -->
                <div style="margin: 1.5rem 0;">
                    <span th:if="${producto.descuento == 0}"
                          style="font-size: 2rem; font-weight: bold;"
                          th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>

                    <span th:if="${producto.descuento > 0}">
                        <span style="font-size: 2rem; font-weight: bold; color: #e74c3c;"
                              th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento / 100.0), 1, 2)} + ' €'"></span>
                        <span style="text-decoration: line-through; color: gray; margin-left: 1rem; font-size: 1.2rem;"
                              th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>
                    </span>
                </div>

                <!-- Descripción completa -->
                <p th:text="${producto.descripcion}" style="font-size: 1rem; line-height: 1.8;"></p>

                <!-- Volver -->
                <a th:href="@{/productos}" style="margin-top: 2rem; display: inline-block;">← Volver al listado</a>

            </div>

        </div>

    </section>

    <div th:replace="~{fragmentos/pie :: pie}"></div>

</div>

<th:block th:replace="~{fragmentos/scripts-fin :: scripts-fin}"></th:block>

</body>
</html>
