<!DOCTYPE html>
<html lang="es" class="no-js" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean — Productos</title>

    <script>
        document.documentElement.classList.remove('no-js');
        document.documentElement.classList.add('js');
    </script>

    <!-- CSS -->
    <th:block th:replace="~{fragmentos/recursos-head :: recursos-head}"></th:block>

</head>

<body id="top">

<!-- preloader -->
<div id="preloader">
    <div id="loader" class="dots-fade">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<!-- page wrap -->
<div id="page" class="s-pagewrap">

    <!-- # site header -->
    <div th:replace="~{fragmentos/cabecera :: cabecera('shop')}"></div>

    <!-- # productos -->
    <section class="container" style="padding-top: 12rem; padding-bottom: 6rem;">

        <div class="row">
            <div class="column xl-12">
                <div class="section-header" data-num="01">
                    <h2 class="text-display-title">Nuestros Cafés</h2>
                </div>
            </div>
        </div>

        <div class="row" style="margin-top: 4rem;">

            <!-- Una tarjeta por cada producto -->
            <div class="column xl-3 lg-4 md-6 mob-12"
                 th:each="producto : ${productos}"
                 style="margin-bottom: 4rem;">

                <!-- Imagen del producto -->
                <figure style="position: relative;">
                    <!-- Badge de descuento -->
                    <span th:if="${producto.descuento > 0}"
                          style="position: absolute; top: 10px; left: 10px; background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;"
                          th:text="${producto.descuento} + '%'"></span>

                    <img th:if="${producto.imagen != null}"
                         th:src="@{${producto.imagen}}"
                         th:alt="'Imagen de ' + ${producto.nombre}"
                         style="width: 100%; height: 220px; object-fit: cover;">

                    <img th:if="${producto.imagen == null}"
                         th:src="@{/images/categories/no-image.webp}"
                         alt=""
                         style="width: 100%; height: 220px; object-fit: cover;">
                </figure>

                <!-- Nombre (enlace al detalle) -->
                <h4 style="margin-top: 1.5rem;">
                    <a th:href="@{/productos/{id}/{slug}(id=${producto.id}, slug=${slugs[producto.id]})}"
                       th:text="${producto.nombre}"></a>
                </h4>

                <!-- Marca (solo si tiene) -->
                <p th:if="${producto.marca != null}"
                   style="color: gray; font-size: 0.9rem; margin-top: 0.25rem;">
                    <a th:href="@{/marcas/{id}/{slug}(id=${producto.marca.id}, slug=${T(es.iesclaradelrey.da2d1a.tiendarmgaos.common.utils.SlugUtils).toSlug(producto.marca.nombre)})}"
                       style="color: gray;"
                       th:text="${producto.marca.nombre}"></a>
                </p>

                <!-- Precio con o sin descuento -->
                <div style="margin-top: 0.5rem;">
                    <!-- Sin descuento -->
                    <span th:if="${producto.descuento == 0}"
                          style="font-size: 1.2rem; font-weight: bold;"
                          th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>

                    <!-- Con descuento -->
                    <span th:if="${producto.descuento > 0}">
                        <span style="font-size: 1.2rem; font-weight: bold; color: #e74c3c;"
                              th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento / 100.0), 1, 2)} + ' €'"></span>
                        <span style="text-decoration: line-through; color: gray; margin-left: 0.5rem; font-size: 0.9rem;"
                              th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>
                    </span>
                </div>

                <!-- Primeros 200 caracteres de la descripción -->
                <p style="margin-top: 0.75rem; font-size: 1.6rem;"
                   th:text="${#strings.abbreviate(producto.descripcion, 200)}"></p>

            </div>

        </div>

    </section>

    <!-- # footer -->
    <div th:replace="~{fragmentos/pie :: pie}"></div>

</div> <!-- end page-wrap -->

<!-- Java Script -->
<th:block th:replace="~{fragmentos/scripts-fin :: scripts-fin}"></th:block>

</body>
</html>
