<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean Admin — Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{admin/fragmentos/navbar :: navbar('categorias')}"></div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Categorías</h1>
        <a th:href="@{/admin/categorias/new}" class="btn btn-success">
            <i class="bi bi-plus-lg me-1"></i>Nueva categoría
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Descripción</th>
                    <th scope="col">Activa</th>
                    <th scope="col" class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="categoria : ${categorias}">
                    <td th:text="${categoria.id}"></td>
                    <td th:text="${categoria.nombre}"></td>
                    <td th:text="${#strings.abbreviate(categoria.descripcion, 60)}"></td>
                    <td>
                        <i th:if="${categoria.activo}" class="bi bi-check-circle-fill text-success"></i>
                        <i th:unless="${categoria.activo}" class="bi bi-x-circle-fill text-danger"></i>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/categorias/{id}/edit(id=${categoria.id})}"
                           class="btn btn-sm btn-outline-secondary me-1"
                           aria-label="Editar categoría">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                        <a th:href="@{/admin/categorias/{id}/delete(id=${categoria.id})}"
                           class="btn btn-sm btn-outline-danger"
                           aria-label="Eliminar categoría">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="5" class="text-muted small"
                        th:text="${categorias.size()} + ' categoría(s) en total'"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/categorias/new}" class="btn btn-success">
            <i class="bi bi-plus-lg me-1"></i>Nueva categoría
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
