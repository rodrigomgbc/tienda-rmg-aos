<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean Admin — Nueva categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{admin/fragmentos/navbar :: navbar('categorias')}"></div>

<div class="container py-5">

    <h1 class="h3 mb-4" th:text="${categoria.id == null} ? 'Nueva categoría' : 'Editar categoría'"></h1>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/categorias/{id}/edit(id=${categoria.id})}"
                  th:if="${categoria.id != null}"
                  th:object="${categoria}" method="post" novalidate>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre"
                           th:field="*{nombre}">
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción</label>
                    <textarea class="form-control" id="descripcion"
                              th:field="*{descripcion}" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label for="imagen" class="form-label">Imagen (ruta)</label>
                    <input type="text" class="form-control" id="imagen"
                           th:field="*{imagen}">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="activo"
                           th:field="*{activo}">
                    <label class="form-check-label" for="activo">Activa</label>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>

            <form th:action="@{/admin/categorias/new}"
                  th:if="${categoria.id == null}"
                  th:object="${categoria}" method="post" novalidate>

                <div class="mb-3">
                    <label for="nombre2" class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre2"
                           th:field="*{nombre}">
                </div>

                <div class="mb-3">
                    <label for="descripcion2" class="form-label">Descripción</label>
                    <textarea class="form-control" id="descripcion2"
                              th:field="*{descripcion}" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label for="imagen2" class="form-label">Imagen (ruta)</label>
                    <input type="text" class="form-control" id="imagen2"
                           th:field="*{imagen}">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="activo2"
                           th:field="*{activo}">
                    <label class="form-check-label" for="activo2">Activa</label>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
