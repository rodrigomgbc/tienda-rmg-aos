<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean Admin — Eliminar marca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{admin/fragmentos/navbar :: navbar('marcas')}"></div>

<div class="container py-5">

    <h1 class="h3 mb-4">Eliminar marca</h1>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-danger">
        <div class="card-body">
            <p class="fs-5">
                ¿Seguro que desea borrar la marca
                <strong th:text="${marca.nombre}"></strong>?
            </p>
            <p class="text-muted">Esta acción no se puede deshacer.</p>

            <form th:action="@{/admin/marcas/{id}/delete(id=${marca.id})}" method="post">
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Eliminar
                    </button>
                    <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
