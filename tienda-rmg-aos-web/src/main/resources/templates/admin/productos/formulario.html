<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean Admin — Nuevo producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{admin/fragmentos/navbar :: navbar('productos')}"></div>

<div class="container py-5">

    <h1 class="h3 mb-4">Nuevo producto</h1>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/productos/new}" th:object="${producto}" method="post">

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre"
                               th:field="*{nombre}" maxlength="200">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="codigoEan" class="form-label">Código EAN-13 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="codigoEan"
                               th:field="*{codigoEan}" maxlength="13">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="descripcion"
                              th:field="*{descripcion}" rows="5" maxlength="4000"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="precio" class="form-label">Precio (€) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="precio"
                               th:field="*{precio}" step="0.01" min="0">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="descuento" class="form-label">Descuento (%) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="descuento"
                               th:field="*{descuento}" min="0" max="99">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="imagen" class="form-label">Imagen (ruta)</label>
                        <input type="text" class="form-control" id="imagen"
                               th:field="*{imagen}" maxlength="500">
                    </div>
                </div>

                <!-- Select de marca (obligatorio) -->
                <div class="mb-3">
                    <label for="marcaId" class="form-label">Marca <span class="text-danger">*</span></label>
                    <select class="form-select" id="marcaId" name="marcaId">
                        <option value="">-- Selecciona una marca --</option>
                        <option th:each="marca : ${marcas}"
                                th:value="${marca.id}"
                                th:text="${marca.nombre}"
                                th:selected="${producto.marca != null && producto.marca.id == marca.id}">
                        </option>
                    </select>
                </div>

                <!-- Checkboxes de categorías (opcional) -->
                <div class="mb-3">
                    <label class="form-label">Categorías</label>
                    <div class="row">
                        <div class="col-md-4" th:each="categoria : ${categorias}">
                            <div class="form-check">
                                <input type="checkbox"
                                       class="form-check-input"
                                       name="categoriasIds"
                                       th:value="${categoria.id}"
                                       th:id="'cat-' + ${categoria.id}"
                                       th:checked="${producto.categorias.contains(categoria)}">
                                <label class="form-check-label"
                                       th:for="'cat-' + ${categoria.id}"
                                       th:text="${categoria.nombre}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-check-lg me-1"></i>Guardar
                    </button>
                    <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
