<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RawBean Admin — Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{admin/fragmentos/navbar :: navbar('productos')}"></div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Productos</h1>
        <a th:href="@{/admin/productos/new}" class="btn btn-warning">
            <i class="bi bi-plus-lg me-1"></i>Nuevo producto
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Marca</th>
                    <th scope="col">Precio</th>
                    <th scope="col">Descuento</th>
                    <th scope="col" class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="producto : ${productos}">
                    <td th:text="${producto.id}"></td>
                    <td th:text="${producto.nombre}"></td>
                    <td th:text="${producto.marca.nombre}"></td>
                    <td th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></td>
                    <td>
                            <span th:if="${producto.descuento > 0}"
                                  class="badge bg-danger"
                                  th:text="${producto.descuento} + '%'"></span>
                        <span th:if="${producto.descuento == 0}"
                              class="text-muted">—</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/productos/{id}/edit(id=${producto.id})}"
                           class="btn btn-sm btn-outline-secondary me-1"
                           aria-label="Editar producto">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                        <a th:href="@{/admin/productos/{id}/delete(id=${producto.id})}"
                           class="btn btn-sm btn-outline-danger"
                           aria-label="Eliminar producto">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="6" class="text-muted small"
                        th:text="${productos.size()} + ' producto(s) en total'"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/productos/new}" class="btn btn-warning">
            <i class="bi bi-plus-lg me-1"></i>Nuevo producto
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
