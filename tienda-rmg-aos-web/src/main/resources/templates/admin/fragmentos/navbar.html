<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">
            <i class="bi bi-gear-fill me-2"></i>RawBean Admin
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'inicio'} ? 'active'"
                       th:href="@{/admin}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'marcas'} ? 'active'"
                       th:href="@{/admin/marcas}">Marcas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'categorias'} ? 'active'"
                       th:href="@{/admin/categorias}">Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'productos'} ? 'active'"
                       th:href="@{/admin/productos}">Productos</a>
                </li>
            </ul>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver a la tienda
            </a>
        </div>
    </div>
</nav>
</body>
</html>
